# ── Docker Compose — 智能研报生成系统 ─────────────────────────────────
#
# 架构说明：
#   - PostgreSQL + Qdrant: Docker 容器管理
#   - Redis: 本地 Windows 服务 (localhost:6379)，不在本 compose 中管理
#   - app 容器通过 host.docker.internal 访问宿主机 Redis

services:
  # ── Main API ──────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=prod
      - PYTHONPATH=/app
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - REDIS_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  # ── MCP Search (Tavily) ───────────────────────────────────────────
  mcp-search:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn mcp_tools.mcp_servers.search_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    restart: unless-stopped

  # ── MCP Database (PostgreSQL via community image) ─────────────────
  mcp-database:
    image: writenotenow/postgres-mcp:latest
    ports:
      - "8002:8002"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - PG_DATABASE=research_agent
    depends_on:
      - postgres
    restart: unless-stopped

  # ── MCP Chart ─────────────────────────────────────────────────────
  mcp-chart:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn mcp_tools.mcp_servers.chart_server:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    restart: unless-stopped

  # ── MCP Email ─────────────────────────────────────────────────────
  mcp-email:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn mcp_tools.mcp_servers.email_server:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=research_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (Vector DB) ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Nginx (Reverse Proxy) ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
  qdrant_data:
