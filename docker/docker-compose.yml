# ── Docker Compose — 智能研报生成系统 ─────────────────────────────────
#
# 架构说明：
#   - PostgreSQL + Qdrant: Docker 容器管理
#   - Redis: 本地 Windows 服务 (localhost:6379)，不在本 compose 中管理
#   - app/mcp-search/mcp-chart/mcp-email 共享同一个镜像，command 区分

services:
  # ── Main API ──────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: research-agent:latest
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=prod
      - PYTHONPATH=/app
      - PG_HOST=postgres
      - QDRANT_HOST=qdrant
      - REDIS_HOST=host.docker.internal
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MCP Search (Tavily) ───────────────────────────────────────────
  mcp-search:
    image: research-agent:latest
    command: uvicorn mcp_tools.mcp_servers.search_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    depends_on:
      - app
    restart: unless-stopped

  # ── MCP Database (PostgreSQL via community image) ─────────────────
  mcp-database:
    image: writenotenow/postgres-mcp:latest
    ports:
      - "8002:8002"
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=postgres
      - PG_DATABASE=research_agent
    depends_on:
      - postgres
    restart: unless-stopped

  # ── MCP Chart ─────────────────────────────────────────────────────
  mcp-chart:
    image: research-agent:latest
    command: uvicorn mcp_tools.mcp_servers.chart_server:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    depends_on:
      - app
    restart: unless-stopped

  # ── MCP Email ─────────────────────────────────────────────────────
  mcp-email:
    image: research-agent:latest
    command: uvicorn mcp_tools.mcp_servers.email_server:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    depends_on:
      - app
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=research_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (Vector DB) ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Nginx (Reverse Proxy) ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  # ── Prometheus ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana/dashboards/provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./grafana/dashboards/research-agent.json:/etc/grafana/provisioning/dashboards/research-agent.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
  prometheus_data:
  grafana_data:
